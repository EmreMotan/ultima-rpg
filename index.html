<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Emberfall RPG</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="ui-overlay">
      <div id="status-bar">
        <span id="hp">HP: 10/10</span>
        <span id="gold">Gold: 0</span>
        <span id="level">LVL: 1</span>
        <span id="version">v0.9.1</span>
      </div>
      <div id="zone-name"></div>
      <div id="message-log"></div>
    </div>
    <div id="inventory-panel" class="hidden">
      <div id="inventory-header">
        <span>Inventory</span>
        <button id="btn-close-inventory">✕</button>
      </div>
      <div id="inventory-grid"></div>
      <div id="inventory-hint">Select an item to use it</div>
    </div>
    <div id="controls">
      <button id="btn-up">▲</button>
      <button id="btn-left">◀</button>
      <button id="btn-action">A</button>
      <button id="btn-inventory">📦</button>
      <button id="btn-right">▶</button>
      <button id="btn-down">▼</button>
    </div>
  </div>
  <div id="dialogue-modal" class="hidden">
    <div id="dialogue-content">
      <div id="dialogue-name"></div>
      <div id="dialogue-text"></div>
      <div id="dialogue-prompt">Tap A or Press Any Key To Continue</div>
    </div>
  </div>
  <div id="combat-log" class="hidden"></div>
  <script type="module" src="js/game.js?v=0.9.1"></script>
</body>
</html>
